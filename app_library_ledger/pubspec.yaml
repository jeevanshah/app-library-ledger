name: priceminder
description: "Track all your app subscriptions in one place. Simple, private, offline."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.0
  uuid: ^4.0.0
  url_launcher: ^6.0.0
  fl_chart: ^0.68.0
  hugeicons: ^1.1.5
  flutter_local_notifications: ^18.0.0
  share_plus: ^10.0.0
  path_provider: ^2.1.0
  intl: ^0.19.0
  smooth_page_indicator: ^1.1.0
  google_fonts: ^6.2.1
  google_mlkit_text_recognition: ^0.16.0
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/catalog.json
    - assets/service_icons/
    - assets/offers_sample.json

flutter_launcher_icons:
  android: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FDFDFB"
  adaptive_icon_foreground: "assets/images/logo_adaptive_fg.png"
